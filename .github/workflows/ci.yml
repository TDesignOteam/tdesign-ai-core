name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 构建与质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建
        run: pnpm build

      - name: 类型检查
        run: pnpm type-check

      - name: ESLint
        run: pnpm lint

      - name: Prettier
        run: pnpm format:check
